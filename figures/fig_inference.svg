<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520">
<defs>
  <style>
    .title { font-family: SimHei, SimSun, DejaVu Sans, sans-serif; font-size: 15px; font-weight: 700; fill: #111827; }
    .main { font-family: SimHei, SimSun, DejaVu Sans, sans-serif; font-size: 13px; font-weight: 700; fill: #1F2937; }
    .sub { font-family: SimHei, SimSun, DejaVu Sans, sans-serif; font-size: 11px; fill: #4B5563; }
  </style>
</defs>

<rect width="960" height="520" fill="white"/>
<rect x="34" y="24" width="892" height="468" rx="14" fill="none" stroke="#CBD5E1" stroke-width="1.4" stroke-dasharray="6 4"/>
<text x="480" y="50" text-anchor="middle" class="title">Objective Evaluation Flow for a Candidate Deployment</text>

<rect x="390" y="76" width="180" height="54" rx="8" fill="#E0F2FE" stroke="#0EA5E9" stroke-width="1.6"/>
<text x="480" y="98" text-anchor="middle" class="main">Candidate Solution</text>
<text x="480" y="116" text-anchor="middle" class="sub">deployment encoding</text>

<rect x="390" y="150" width="180" height="58" rx="8" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.6"/>
<text x="480" y="173" text-anchor="middle" class="main">Decode Particle</text>
<text x="480" y="192" text-anchor="middle" class="sub">code to physical position</text>

<rect x="390" y="230" width="180" height="58" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.6"/>
<text x="480" y="253" text-anchor="middle" class="main">Propagation Model</text>
<text x="480" y="272" text-anchor="middle" class="sub">A2G / G2G path loss</text>

<rect x="230" y="326" width="210" height="58" rx="8" fill="#DCFCE7" stroke="#22C55E" stroke-width="1.6"/>
<text x="335" y="349" text-anchor="middle" class="main">ECR Evaluation</text>
<text x="335" y="368" text-anchor="middle" class="sub">coverage indicator</text>

<rect x="520" y="326" width="210" height="58" rx="8" fill="#FEE2E2" stroke="#EF4444" stroke-width="1.6"/>
<text x="625" y="349" text-anchor="middle" class="main">Jmin Evaluation</text>
<text x="625" y="368" text-anchor="middle" class="sub">weakest-point indicator</text>

<rect x="350" y="414" width="260" height="54" rx="8" fill="#F3E8FF" stroke="#A855F7" stroke-width="1.6"/>
<text x="480" y="436" text-anchor="middle" class="main">Objective Vector</text>
<text x="480" y="454" text-anchor="middle" class="sub">multi-objective comparison</text>

<rect x="660" y="414" width="190" height="54" rx="8" fill="#ECFEFF" stroke="#06B6D4" stroke-width="1.6"/>
<text x="755" y="436" text-anchor="middle" class="main">Pareto Archive</text>
<text x="755" y="454" text-anchor="middle" class="sub">non-dominated set</text>

<line x1="480" y1="130" x2="480" y2="150" stroke="#4B5563" stroke-width="1.7"/>
<polygon points="480,150 473,138 487,138" fill="#4B5563"/>

<line x1="480" y1="208" x2="480" y2="230" stroke="#4B5563" stroke-width="1.7"/>
<polygon points="480,230 473,218 487,218" fill="#4B5563"/>

<line x1="480" y1="288" x2="480" y2="306" stroke="#4B5563" stroke-width="1.7"/>
<line x1="335" y1="306" x2="625" y2="306" stroke="#4B5563" stroke-width="1.7"/>
<line x1="335" y1="306" x2="335" y2="326" stroke="#4B5563" stroke-width="1.7"/>
<line x1="625" y1="306" x2="625" y2="326" stroke="#4B5563" stroke-width="1.7"/>
<polygon points="335,326 328,314 342,314" fill="#4B5563"/>
<polygon points="625,326 618,314 632,314" fill="#4B5563"/>

<line x1="335" y1="384" x2="335" y2="398" stroke="#4B5563" stroke-width="1.7"/>
<line x1="625" y1="384" x2="625" y2="398" stroke="#4B5563" stroke-width="1.7"/>
<line x1="335" y1="398" x2="480" y2="398" stroke="#4B5563" stroke-width="1.7"/>
<line x1="625" y1="398" x2="480" y2="398" stroke="#4B5563" stroke-width="1.7"/>
<line x1="480" y1="398" x2="480" y2="414" stroke="#4B5563" stroke-width="1.7"/>
<polygon points="480,414 473,402 487,402" fill="#4B5563"/>

<line x1="610" y1="441" x2="660" y2="441" stroke="#4B5563" stroke-width="1.7"/>
<polygon points="660,441 648,434 648,448" fill="#4B5563"/>
</svg>
